; ============================================================
; ACBrLibTEFD.ini  —  Configuração TEF (PayGo Integrado)
; Ambiente: SANDBOX (modo DEMO do PayGo Windows)
; ============================================================
; Local recomendado: C:\NexaACBr\bin\ACBrLibTEFD.ini
; A DLL ACBrTEFD64.dll deve estar na MESMA pasta.
; O PayGo Windows (PGWebLib) está instalado em:
;   C:\Program Files (x86)\PayGo\
; e DEVE estar ATIVADO em modo DEMO (tela roxa) com:
;   CNPJ  = 44.932.369/0001-08
;   PDC   = 111476
; ============================================================

[Principal]
LogNivel=4
LogPath=C:\NexaACBr\logs\
TipoResposta=2     ; 2 = JSON (mais fácil de parsear no Node)

[TEFD]
NomeAplicacao=NEXA PDV
VersaoAplicacao=1.0.0
ArqLog=C:\NexaACBr\logs\tef.log
SoftwareHouse=NEXA Gestao Inteligente
ChaveAcessoSH=
TrocarDataHoraAuto=1
TrocarTabelasAuto=1
TrocarValidadeTabelas=2     ; dias
Multiplos_Cartoes=1
SuportaSaque=1
SuportaDesconto=1
SuportaViaDiferenciada=1
ImprimirViaClienteReduzida=0

[TEFD_PayGo]
Habilitado=1
; PGWebLib.dll está junto da ACBrTEFD64.dll em C:\NexaACBr\bin\
PathLib=C:\NexaACBr\bin\
Plataforma=4                ; 4 = WIN64
NomeEstabelecimento=NEXA PDV - SANDBOX
PontoCaptura=111476
CNPJ=44932369000108
Endereco=pos-transac-sb.tpgweb.io
Porta=31735
ExibirMensagemPinPad=1
ImprimirViaEstabelecimento=1
ImprimirViaCliente=1

; ===== Outros provedores desativados nesta config =====
[TEFD_GP]
Habilitado=0
[TEFD_VeSPague]
Habilitado=0
[TEFD_CliSiTef]
Habilitado=0
[TEFD_DiscaTEFDial]
Habilitado=0
[TEFD_GERTEC]
Habilitado=0
[TEFD_HiperTEF]
Habilitado=0
[TEFD_TefDial]
Habilitado=0
[TEFD_PetroPay]
Habilitado=0
[TEFD_Bin]
Habilitado=0
