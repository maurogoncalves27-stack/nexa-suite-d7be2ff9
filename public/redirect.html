<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirecionando...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #f8fafc;
      text-align: center;
      padding: 20px;
    }
    .logo { width: 80px; height: 80px; margin-bottom: 24px; }
    h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 8px; }
    p { color: #94a3b8; font-size: 0.95rem; margin-bottom: 24px; }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(59, 130, 246, 0.2);
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .manual-link {
      margin-top: 24px;
      color: #3b82f6;
      text-decoration: underline;
      cursor: pointer;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <svg class="logo" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" rx="20" fill="#3B82F6"/>
    <path d="M30 30 L50 70 L70 30" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
  <h1>Redirecionando...</h1>
  <p>Você será direcionado para a página de avaliação em instantes.</p>
  <div class="spinner"></div>
  <a id="manual-link" class="manual-link">Clique aqui se não for redirecionado</a>

  <script>
    (function() {
      const params = new URLSearchParams(window.location.search);
      const targetUrl = params.get('url');
      const manualLink = document.getElementById('manual-link');

      if (targetUrl) {
        manualLink.href = targetUrl;
        manualLink.textContent = 'Clique aqui para continuar';
        // Redireciona automaticamente após um breve delay
        setTimeout(function() {
          window.location.replace(targetUrl);
        }, 800);
      } else {
        document.querySelector('h1').textContent = 'Link inválido';
        document.querySelector('p').textContent = 'Nenhuma URL de destino foi fornecida.';
        manualLink.style.display = 'none';
        document.querySelector('.spinner').style.display = 'none';
      }
    })();
  </script>
</body>
</html>
